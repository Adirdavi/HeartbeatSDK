name: heartbeat_sdk
description: >
  A standalone smartwatch SDK for managing activity sessions and transmitting
  real-time availability signals (Heartbeats) to the cloud. Designed for
  life-safety monitoring on Wear OS and watchOS.
version: 1.0.0
homepage: https://github.com/heartbeat-sdk

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.2.0
  uuid: ^4.2.0
  vibration: ^2.0.0
  battery_plus: ^6.0.0
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
